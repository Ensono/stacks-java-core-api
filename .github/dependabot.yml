version: 2

multi-ecosystem-groups:
  all-dependencies:
    schedule:
      interval: weekly
      day: monday
      timezone: Europe/London
    open-pull-requests-limit: 10
    reviewers:
      - Ensono/dependency-management

updates:
  - package-ecosystem: maven
    directory: /java
    patterns:
      - "*"
    multi-ecosystem-group: all-dependencies
